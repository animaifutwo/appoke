<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Gen 1 Checklist</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Manrope:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            body: ['Manrope', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel para JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #f9fafb;
      overscroll-behavior: none;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes checkPop {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes progressPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out both; }
    .skeleton-shimmer {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .animate-check-pop { animation: checkPop 0.3s ease-out both; }
    .animate-progress-pulse { animation: progressPulse 0.4s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    /* ===== CONSTANTS ===== */
    const STORAGE_KEY = 'pokemon_checklist_purchased_gen1';
    const API_URL = 'https://pokeapi.co/api/v2/pokemon?limit=151';
    const IMAGE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/';

    const FILTERS = [
      { key: 'all', label: 'Todos' },
      { key: 'purchased', label: 'Comprados' },
      { key: 'missing', label: 'Faltantes' },
    ];

    /* ===== HELPERS ===== */
    function loadPurchased() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return new Set();
        return new Set(JSON.parse(raw));
      } catch { return new Set(); }
    }

    function savePurchased(set) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
    }

    /* ===== SVG ICONS (inline, no dependency needed) ===== */
    function SparklesIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-red-500">
          <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
          <path d="M20 3v4"/><path d="M22 5h-4"/>
        </svg>
      );
    }

    function SearchIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-400">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
      );
    }

    function CheckCircleIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-red-500 animate-check-pop">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>
        </svg>
      );
    }

    function CircleIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gray-200">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      );
    }

    /* ===== POKEMON CARD COMPONENT ===== */
    function PokemonCard({ id, name, purchased, onToggle }) {
      const [imgLoaded, setImgLoaded] = useState(false);
      const formattedId = `#${String(id).padStart(3, '0')}`;
      const imgUrl = `${IMAGE_BASE}${id}.png`;

      const handleClick = useCallback(() => {
        onToggle(id);
      }, [id, onToggle]);

      return (
        <button
          data-testid={`pokemon-card-${id}`}
          onClick={handleClick}
          className={`
            group relative flex flex-col items-center p-4 rounded-[20px] border-2
            bg-white transition-all duration-200 active:scale-[0.96] cursor-pointer overflow-hidden
            focus:outline-none focus-visible:ring-2 focus-visible:ring-red-400 w-full
            ${purchased
              ? 'border-red-400 bg-red-50/50 shadow-md shadow-red-100/60'
              : 'border-gray-200/80 shadow-sm hover:shadow-md hover:border-gray-300'
            }
          `}
        >
          <span
            data-testid={`pokemon-number-${id}`}
            className="absolute top-3 left-3 text-[10px] font-mono font-bold tracking-widest text-gray-400"
          >
            {formattedId}
          </span>

          <span className="absolute top-3 right-3">
            {purchased ? <CheckCircleIcon /> : <CircleIcon />}
          </span>

          <div className="w-24 h-24 flex items-center justify-center mt-2">
            {!imgLoaded && (
              <div className="w-20 h-20 rounded-full skeleton-shimmer" />
            )}
            <img
              src={imgUrl}
              alt={name}
              loading="lazy"
              onLoad={() => setImgLoaded(true)}
              className={`
                w-24 h-24 object-contain drop-shadow-md transition-all duration-300
                ${!imgLoaded ? 'opacity-0 absolute' : 'opacity-100'}
                ${purchased ? 'grayscale-0' : 'grayscale-[0.5] opacity-70'}
                group-hover:scale-105
              `}
            />
          </div>

          <span
            data-testid={`pokemon-name-${id}`}
            className={`
              text-sm font-bold capitalize mt-3 transition-colors duration-200
              ${purchased ? 'text-gray-900' : 'text-gray-500'}
            `}
          >
            {name}
          </span>
        </button>
      );
    }

    /* ===== MAIN APP COMPONENT ===== */
    function App() {
      const [pokemon, setPokemon] = useState([]);
      const [purchased, setPurchased] = useState(loadPurchased);
      const [filter, setFilter] = useState('all');
      const [search, setSearch] = useState('');
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch(API_URL)
          .then(res => {
            if (!res.ok) throw new Error('Failed to fetch');
            return res.json();
          })
          .then(data => {
            const list = data.results.map((p, i) => ({
              id: i + 1,
              name: p.name,
            }));
            setPokemon(list);
            setLoading(false);
          })
          .catch(err => {
            setError(err.message);
            setLoading(false);
          });
      }, []);

      useEffect(() => {
        savePurchased(purchased);
      }, [purchased]);

      const togglePurchased = useCallback((id) => {
        setPurchased(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      }, []);

      const filtered = useMemo(() => {
        let list = pokemon;
        if (search.trim()) {
          const q = search.toLowerCase().trim();
          list = list.filter(p =>
            p.name.toLowerCase().includes(q) ||
            `#${String(p.id).padStart(3, '0')}`.includes(q)
          );
        }
        if (filter === 'purchased') list = list.filter(p => purchased.has(p.id));
        else if (filter === 'missing') list = list.filter(p => !purchased.has(p.id));
        return list;
      }, [pokemon, search, filter, purchased]);

      const progressPct = pokemon.length > 0
        ? Math.round((purchased.size / 151) * 100)
        : 0;

      if (error) {
        return (
          <div className="max-w-[428px] mx-auto min-h-screen bg-gray-50 flex items-center justify-center p-6">
            <div className="text-center">
              <p className="text-red-500 font-semibold text-lg mb-2">Error al cargar</p>
              <p className="text-gray-500 text-sm">{error}</p>
              <button onClick={() => window.location.reload()} className="mt-4 px-6 py-2 bg-red-500 text-white rounded-full text-sm font-semibold">
                Reintentar
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-[428px] mx-auto min-h-screen bg-gray-50 relative shadow-2xl overflow-hidden font-body">
          {/* Sticky Header */}
          <header
            data-testid="app-header"
            className="sticky top-0 z-50 backdrop-blur-xl bg-white/90 border-b border-gray-200 px-4 pt-6 pb-4 flex flex-col gap-3 shadow-sm"
          >
            <div className="flex justify-between items-center">
              <div className="flex items-center gap-2">
                <SparklesIcon />
                <h1
                  data-testid="app-title"
                  className="text-xl font-heading font-bold tracking-tight text-gray-900"
                >
                  Gen 1 Checklist
                </h1>
              </div>
              <div
                data-testid="progress-counter"
                className={`px-3 py-1.5 rounded-full bg-red-100 text-red-600 text-[11px] font-bold tracking-wide uppercase ${
                  purchased.size > 0 ? 'animate-progress-pulse' : ''
                }`}
              >
                {purchased.size}/151
              </div>
            </div>

            <div data-testid="progress-bar" className="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-red-400 to-red-500 rounded-full transition-all duration-500 ease-out"
                style={{ width: `${progressPct}%` }}
              />
            </div>

            <div className="relative w-full">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none">
                <SearchIcon />
              </span>
              <input
                data-testid="search-input"
                type="text"
                placeholder="Buscar Pokemon..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                className="w-full rounded-xl bg-gray-100 border-2 border-transparent focus:bg-white focus:border-red-400 focus:ring-2 focus:ring-red-100 transition-all pl-9 pr-4 py-3 text-sm placeholder:text-gray-400 outline-none font-body"
              />
            </div>

            <div data-testid="filter-container" className="flex gap-2 no-scrollbar pb-1">
              {FILTERS.map(f => (
                <button
                  key={f.key}
                  data-testid={`filter-${f.key}`}
                  onClick={() => setFilter(f.key)}
                  className={`
                    px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap transition-all duration-200 border
                    ${filter === f.key
                      ? 'bg-gray-900 text-white border-gray-900 shadow-sm'
                      : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50 active:bg-gray-100'
                    }
                  `}
                >
                  {f.label}
                  {f.key === 'purchased' && purchased.size > 0 && (
                    <span className="ml-1.5 text-[10px] opacity-70">{purchased.size}</span>
                  )}
                  {f.key === 'missing' && purchased.size < 151 && (
                    <span className="ml-1.5 text-[10px] opacity-70">{151 - purchased.size}</span>
                  )}
                </button>
              ))}
            </div>
          </header>

          {/* Content */}
          <main className="px-4 pt-4 pb-10">
            {loading ? (
              <div data-testid="loading-skeleton" className="grid grid-cols-2 gap-4">
                {Array.from({ length: 8 }).map((_, i) => (
                  <div key={i} className="h-44 rounded-[20px] skeleton-shimmer" />
                ))}
              </div>
            ) : filtered.length === 0 ? (
              <div data-testid="empty-state" className="flex flex-col items-center justify-center py-20 text-center">
                <p className="text-gray-400 text-sm font-medium">
                  {search
                    ? 'No se encontro ningun Pokemon'
                    : filter === 'purchased'
                      ? 'Aun no has comprado ninguno'
                      : 'Todos los Pokemon estan comprados'}
                </p>
              </div>
            ) : (
              <div data-testid="pokemon-grid" className="grid grid-cols-2 gap-4">
                {filtered.map((p, idx) => (
                  <div
                    key={p.id}
                    className="animate-fade-in-up"
                    style={{ animationDelay: `${Math.min(idx * 30, 300)}ms` }}
                  >
                    <PokemonCard
                      id={p.id}
                      name={p.name}
                      purchased={purchased.has(p.id)}
                      onToggle={togglePurchased}
                    />
                  </div>
                ))}
              </div>
            )}
          </main>
        </div>
      );
    }

    /* ===== RENDER ===== */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
